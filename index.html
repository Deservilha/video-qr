<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>

  <title>Vídeo</title>

  <style>

    *{
      margin:0;
      padding:0;
      box-sizing:border-box;
    }

    html, body{
      width:100%;
      height:100%;
      background:#000;
      overflow:hidden;

      display:flex;
      align-items:center;
      justify-content:center;

      font-family:Arial, Helvetica, sans-serif;
    }

    .container{
      position:relative;

      width:100vw;
      height:100vh;

      display:flex;
      align-items:center;
      justify-content:center;

      overflow:hidden;

      background:#000;
    }

    /* VIDEO */
    video{

      max-height:100vh;
      max-width:100vw;

      width:auto;
      height:auto;

      object-fit:contain;

      background:#000;

      display:block;
    }

    /* FORÇAR VERTICAL EM MOBILE */
    @media screen and (orientation: landscape){

      video{

        height:90vh;
        width:auto;

        max-width:calc(90vh * 0.5625);
      }
    }

    @media screen and (orientation: portrait){

      video{

        height:100vh;
        width:auto;

        max-width:100vw;
      }
    }

    /* BOTÃO */
    .controls{
      position:absolute;

      bottom:20px;
      right:20px;

      z-index:10;
    }

    .sound-btn{

      width:50px;
      height:50px;

      border:none;
      border-radius:50%;

      cursor:pointer;

      background:rgba(255,255,255,0.18);

      backdrop-filter:blur(10px);

      color:#fff;

      font-size:20px;

      display:flex;
      align-items:center;
      justify-content:center;

      transition:0.25s;

      box-shadow:0 5px 20px rgba(0,0,0,0.35);
    }

    .sound-btn:hover{
      transform:scale(1.05);
    }

    .sound-btn:active{
      transform:scale(0.96);
    }

    .sound-on{
      background:rgba(0, 200, 83, 0.28);
    }

  </style>
</head>

<body>

<div class="container">

  <!-- VIDEO -->
  <video
    id="video"
    autoplay
    muted
    loop
    playsinline
    webkit-playsinline
    preload="auto"
  >
    <source src="video.mp4" type="video/mp4">
    Seu navegador não suporta vídeo.
  </video>

  <!-- BOTÃO -->
  <div class="controls">
    <button
      class="sound-btn"
      id="soundBtn"
      onclick="toggleSound()"
    >
      🔇
    </button>
  </div>

</div>

<script>

  const video = document.getElementById('video');
  const soundBtn = document.getElementById('soundBtn');

  // Corrigir alguns navegadores mobile
  video.addEventListener('loadedmetadata', () => {

    const isVertical = video.videoHeight > video.videoWidth;

    if(isVertical){

      video.style.height = '100vh';
      video.style.width = 'auto';

    }else{

      video.style.width = '100vw';
      video.style.height = 'auto';
    }

  });

  // Alternar áudio
  function toggleSound(){

    if(video.muted){

      video.muted = false;
      video.volume = 1;

      soundBtn.innerHTML = '🔊';
      soundBtn.classList.add('sound-on');

    }else{

      video.muted = true;

      soundBtn.innerHTML = '🔇';
      soundBtn.classList.remove('sound-on');
    }

    video.play();
  }

  // Garantir autoplay
  window.addEventListener('load', () => {

    const playPromise = video.play();

    if(playPromise !== undefined){
      playPromise.catch(() => {});
    }

  });

</script>

</body>
</html>
