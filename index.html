<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>

  <title>Vídeo</title>

  <style>

    *{
      margin:0;
      padding:0;
      box-sizing:border-box;
    }

    html, body{
      width:100%;
      height:100%;
      background:#000;
      overflow:hidden;

      display:flex;
      align-items:center;
      justify-content:center;

      font-family:Arial, Helvetica, sans-serif;
    }

    .container{

      position:relative;

      width:100vw;
      height:100vh;

      overflow:hidden;

      display:flex;
      align-items:center;
      justify-content:center;

      background:#000;
    }

    /* VIDEO */
    video{

      position:absolute;

      top:50%;
      left:50%;

      transform:translate(-50%, -50%);

      max-width:100%;
      max-height:100%;

      width:auto;
      height:auto;

      object-fit:contain;

      background:#000;

      display:block;
    }

    /* PLAY CENTRAL */
    .play-wrapper{

      position:absolute;

      inset:0;

      display:flex;
      align-items:center;
      justify-content:center;

      z-index:20;
    }

    .play-btn{

      width:92px;
      height:92px;

      border:none;
      border-radius:50%;

      cursor:pointer;

      background:rgba(255,255,255,0.16);

      backdrop-filter:blur(12px);

      display:flex;
      align-items:center;
      justify-content:center;

      transition:0.25s;

      box-shadow:0 8px 30px rgba(0,0,0,0.35);
    }

    .play-btn:hover{
      transform:scale(1.06);
    }

    .play-btn:active{
      transform:scale(0.96);
    }

    .play-icon{

      width:36px;
      height:36px;

      margin-left:6px;

      fill:#fff;
    }

    /* BOTÃO SOM */
    .controls{

      position:absolute;

      right:25px;
      bottom:120px;

      z-index:30;
    }

    .sound-btn{

      width:54px;
      height:54px;

      border:none;
      border-radius:50%;

      cursor:pointer;

      background:rgba(255,255,255,0.16);

      backdrop-filter:blur(12px);

      color:#fff;

      font-size:22px;

      display:none;
      align-items:center;
      justify-content:center;

      transition:0.25s;

      box-shadow:0 5px 20px rgba(0,0,0,0.35);
    }

    .sound-btn:hover{
      transform:scale(1.05);
    }

    .sound-btn:active{
      transform:scale(0.96);
    }

    .sound-on{
      background:rgba(0, 200, 83, 0.25);
    }

  </style>
</head>

<body>

<div class="container">

  <!-- VIDEO -->
  <video
    id="video"
    loop
    playsinline
    webkit-playsinline
    preload="auto"
  >
    <!-- IMPORTANTE:
         troque o nome se o Xiaomi cachear -->
    <source src="video2.mp4" type="video/mp4">

    Seu navegador não suporta vídeo.
  </video>

  <!-- PLAY CENTRAL -->
  <div class="play-wrapper" id="playWrapper">

    <button
      class="play-btn"
      id="playBtn"
      onclick="startVideo()"
    >

      <!-- PLAY SVG -->
      <svg
        class="play-icon"
        viewBox="0 0 24 24"
      >
        <path d="M8 5v14l11-7z"/>
      </svg>

    </button>

  </div>

  <!-- BOTÃO SOM -->
  <div class="controls">

    <button
      class="sound-btn"
      id="soundBtn"
      onclick="toggleSound()"
    >
      🔊
    </button>

  </div>

</div>

<script>

  const video = document.getElementById('video');
  const soundBtn = document.getElementById('soundBtn');
  const playWrapper = document.getElementById('playWrapper');

  /* AJUSTAR VIDEO */
  function ajustarVideo(){

    const isVertical =
      video.videoHeight > video.videoWidth;

    if(isVertical){

      video.style.height = '100%';
      video.style.width = 'auto';

    }else{

      video.style.width = '100%';
      video.style.height = 'auto';
    }
  }

  video.addEventListener(
    'loadedmetadata',
    ajustarVideo
  );

  window.addEventListener(
    'resize',
    ajustarVideo
  );

  window.addEventListener(
    'orientationchange',
    ajustarVideo
  );

  /* INICIAR VIDEO */
  async function startVideo(){

    try{

      video.load();

      video.muted = false;
      video.volume = 1;

      await video.play();

      /* remove play central */
      playWrapper.style.display = 'none';

      /* mostrar botão som */
      soundBtn.style.display = 'flex';

      soundBtn.innerHTML = '🔊';

      soundBtn.classList.add('sound-on');

    }catch(error){

      console.log(
        'Erro ao iniciar vídeo:',
        error
      );
    }
  }

  /* TOGGLE SOM */
  function toggleSound(){

    if(video.muted){

      video.muted = false;

      soundBtn.innerHTML = '🔊';

      soundBtn.classList.add('sound-on');

    }else{

      video.muted = true;

      soundBtn.innerHTML = '🔇';

      soundBtn.classList.remove('sound-on');
    }
  }

</script>

</body>
</html>
